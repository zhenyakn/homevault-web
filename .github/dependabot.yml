version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    versioning-strategy: increase
    groups:
      npm-all:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - major
          - minor
          - patch
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      actions-all:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      docker-all:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /homevault-addon
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      addon-docker-all:
        patterns:
          - "*"
