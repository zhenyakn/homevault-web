name: QA Nightly

# Runs the full browser-driven QA suite (Playwright: deep flows + breadth +
# accessibility + mobile/RTL) against the default branch (main) on a schedule
# and on demand — the "is main still healthy?" signal, independent of any PR.
#
# - schedule: once a day. Scheduled runs always execute the workflow as it
#   exists on the DEFAULT branch (main), so this is effectively "nightly on main".
# - workflow_dispatch: trigger manually from the Actions tab / API, optionally
#   against another branch.
#
# Kept separate from qa-e2e.yml (the per-PR/push gate) on purpose: different
# cadence, and a failure here opens a tracking issue instead of blocking a PR.
# The e2e job below mirrors qa-e2e.yml; keep the two in sync when changing setup.

on:
  schedule:
    # 03:00 UTC daily (~early morning Israel time). Adjust as desired.
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: qa-nightly-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: homevault
          MYSQL_USER: homevault
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s --health-timeout=5s --health-retries=10

    env:
      DATABASE_URL: mysql://homevault:password@127.0.0.1:3306/homevault
      JWT_SECRET: devjwtsecret_at_least_16_chars_long_123456

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run QA suite (desktop + mobile + rtl)
        run: pnpm qa

      - name: Upload QA report & artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-nightly-artifacts
          path: |
            qa/artifacts/report
            qa/artifacts/results
            qa/artifacts/*.png
            qa/artifacts/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Publish JUnit test summary
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: qa/artifacts/results/junit.xml
          fail_on_failure: false

  # On failure, open a tracking issue (or comment on the existing open one) so a
  # broken main is visible without anyone watching the Actions tab.
  notify-failure:
    needs: e2e
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Open or update the nightly-failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const titlePrefix = "🌙 Nightly QA failed on " + context.ref.replace("refs/heads/", "");
            const body = [
              `The nightly QA suite failed.`,
              ``,
              `- Branch: \`${context.ref.replace("refs/heads/", "")}\``,
              `- Commit: ${context.sha}`,
              `- Run: ${runUrl}`,
            ].join("\n");

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const match = existing.data.find(
              i => !i.pull_request && i.title.startsWith(titlePrefix),
            );

            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${titlePrefix} (${new Date().toISOString().slice(0, 10)})`,
                body,
              });
            }
