name: Build & Publish Home Assistant Add-on

# Triggered only by the version tag. Creating a GitHub Release also pushes the
# tag, so a single `push: tags` trigger covers both the UI and CLI release flows
# with exactly one run. (Listening to `release: published` as well would start a
# second, concurrent run that races this one on the changelog commit to `main`.)
on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.2.3) — leave empty to use config.yaml version"
        required: false

# Serialize release runs so the CHANGELOG/version commit back to `main` never races.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  ADDON_PATH: homevault-addon

jobs:
  # Required gate: run the full CI suite (type-check, prettier, unit tests, build,
  # and real-MySQL integration tests) before anything is published. Reuses ci.yml
  # so CI and releases share one source of truth.
  ci:
    uses: ./.github/workflows/ci.yml

  changelog:
    runs-on: ubuntu-latest
    needs: [ci]
    # Only run on tag pushes; skip for manual dispatch (no git history context)
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "ADDON_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Generate CHANGELOG.md
        run: |
          VERSION="${{ env.ADDON_VERSION }}"
          CURRENT_TAG="v${VERSION}"
          CHANGELOG_FILE="${{ env.ADDON_PATH }}/CHANGELOG.md"

          # Home Assistant renders this whole file in the add-on update dialog, so
          # it holds ONLY the current release's changes (the full per-version
          # history lives in the GitHub Releases). Range = previous tag..this tag;
          # the very first release has no predecessor and lists all commits.
          PREV_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' "${CURRENT_TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          else
            RANGE="${CURRENT_TAG}"
          fi

          COMMITS=$(git log "$RANGE" \
            --pretty=format:"%s" \
            --no-merges \
            | grep -v '\[skip ci\]' \
            | grep -v '^chore: bump addon' \
            | grep -v '^Merge ' \
            || true)
          if [ -z "$COMMITS" ]; then
            COMMITS="- Internal improvements and dependency updates"
          else
            COMMITS=$(echo "$COMMITS" | sed 's/^/- /')
          fi

          printf "%b" "# Changelog\n\n## ${VERSION}\n${COMMITS}\n" > "$CHANGELOG_FILE"
          echo "Generated $CHANGELOG_FILE:"
          cat "$CHANGELOG_FILE"

      - name: Update config.yaml version
        run: |
          sed -i "s/^version: .*/version: \"${{ env.ADDON_VERSION }}\"/" ${{ env.ADDON_PATH }}/config.yaml

      - name: Commit CHANGELOG.md + config.yaml back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Build the version bump + changelog commit on top of the *current*
          # origin/main and push it. Wrapped in a retry: if origin/main advanced
          # between fetch and push (e.g. a concurrent run), the push is rejected
          # non-fast-forward; we re-sync to the new tip and rebuild from scratch.
          # Both files are regenerated deterministically from tags, so resetting
          # away the in-progress working-tree edits each attempt is correct.
          commit_and_push() {
            git fetch origin main
            git checkout -f -B main origin/main

            # Re-apply version bump on the clean main checkout
            sed -i "s/^version: .*/version: \"${{ env.ADDON_VERSION }}\"/" ${{ env.ADDON_PATH }}/config.yaml

            # Re-generate changelog on the clean main checkout (latest version
            # only — same logic as the Generate CHANGELOG.md step).
            CURRENT_TAG="v${{ env.ADDON_VERSION }}"
            CHANGELOG_FILE="${{ env.ADDON_PATH }}/CHANGELOG.md"
            PREV_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' "${CURRENT_TAG}^" 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..${CURRENT_TAG}"
            else
              RANGE="${CURRENT_TAG}"
            fi
            COMMITS=$(git log "$RANGE" \
              --pretty=format:"%s" \
              --no-merges \
              | grep -v '\[skip ci\]' \
              | grep -v '^chore: bump addon' \
              | grep -v '^Merge ' \
              || true)
            if [ -z "$COMMITS" ]; then
              COMMITS="- Internal improvements and dependency updates"
            else
              COMMITS=$(echo "$COMMITS" | sed 's/^/- /')
            fi
            printf "%b" "# Changelog\n\n## ${{ env.ADDON_VERSION }}\n${COMMITS}\n" > "$CHANGELOG_FILE"

            git add ${{ env.ADDON_PATH }}/CHANGELOG.md ${{ env.ADDON_PATH }}/config.yaml
            if git diff --staged --quiet; then
              echo "No CHANGELOG/version change to commit."
              return 0
            fi
            git commit -m "chore: bump addon to ${{ env.ADDON_VERSION }} + update CHANGELOG [skip ci]"
            git push origin main
          }

          for attempt in 1 2 3 4 5; do
            if commit_and_push; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed (origin/main likely advanced); re-syncing and retrying..."
            sleep $((attempt * 2))
          done
          echo "::error::Failed to push CHANGELOG/version bump to main after 5 attempts."
          exit 1

  build:
    runs-on: ubuntu-latest
    needs: [ci, changelog]
    # CI must pass before publishing. changelog runs on tag pushes and is skipped
    # on manual dispatch — allow skipped, but never a failed changelog.
    if: always() && needs.ci.result == 'success' && (needs.changelog.result == 'success' || needs.changelog.result == 'skipped')
    strategy:
      matrix:
        arch: [amd64, aarch64]
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Build the exact tagged commit so the published image matches the
          # release (no commits that landed on main after the tag). Default ref
          # is the trigger ref: the tag on a tag push, the branch on dispatch.
          # fetch-depth: 0 brings full history + tags for the release-notes range.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image repository name
        run: echo "REPOSITORY_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Resolve version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep '^version:' ${{ env.ADDON_PATH }}/config.yaml | sed 's/version: *"//' | sed 's/"//')
          fi
          echo "ADDON_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved version: $VERSION"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build_push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.ADDON_PATH }}/Dockerfile
          platforms: linux/${{ matrix.arch == 'armv7' && 'arm/v7' || matrix.arch }}
          push: true
          provenance: false
          sbom: false
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ env.ADDON_VERSION }}
          tags: |
            ghcr.io/${{ env.REPOSITORY_LC }}-addon-${{ matrix.arch }}:latest
            ghcr.io/${{ env.REPOSITORY_LC }}-addon-${{ matrix.arch }}:${{ github.sha }}
            ghcr.io/${{ env.REPOSITORY_LC }}-addon-${{ matrix.arch }}:${{ env.ADDON_VERSION }}

      - name: Verify image was actually pushed
        run: |
          IMAGE="ghcr.io/${REPOSITORY_LC}-addon-${{ matrix.arch }}:${ADDON_VERSION}"
          echo "Inspecting $IMAGE"
          docker buildx imagetools inspect "$IMAGE"

      - name: Generate release notes for this version
        if: startsWith(github.ref, 'refs/tags/') && matrix.arch == 'amd64'
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          # Nearest previous version tag (restricted to v* so stray tags are ignored).
          PREV_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' "${CURRENT_TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          else
            RANGE="${CURRENT_TAG}"
          fi
          # Only the commits introduced in this release; same filters as CHANGELOG.
          NOTES=$(git log "$RANGE" \
            --pretty=format:"%s" \
            --no-merges \
            | grep -v '\[skip ci\]' \
            | grep -v '^chore: bump addon' \
            | grep -v '^Merge ' \
            || true)
          if [ -z "$NOTES" ]; then
            NOTES="- Internal improvements and dependency updates"
          else
            NOTES=$(echo "$NOTES" | sed 's/^/- /')
          fi
          {
            echo "## What's changed in ${CURRENT_TAG#v}"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "Changes since ${PREV_TAG}:"
              echo ""
            fi
            printf "%s\n" "$NOTES"
          } > RELEASE_NOTES.md
          echo "Generated RELEASE_NOTES.md:"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && matrix.arch == 'amd64'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "HomeVault ${{ env.ADDON_VERSION }}"
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
