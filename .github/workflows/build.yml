name: Build & Publish Home Assistant Add-on

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.2.3) — leave empty to use config.yaml version"
        required: false

env:
  ADDON_PATH: homevault-addon

jobs:
  changelog:
    runs-on: ubuntu-latest
    # Only run on tag pushes; skip for manual dispatch (no git history context)
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version from tag
        run: echo "ADDON_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Generate CHANGELOG.md
        run: |
          VERSION="${{ env.ADDON_VERSION }}"
          CHANGELOG_FILE="${{ env.ADDON_PATH }}/CHANGELOG.md"

          # ── Collect all version tags sorted newest-first ─────────────────────
          TAGS=$(git tag --list 'v*' --sort=-version:refname)
          CURRENT_TAG="v${VERSION}"

          # ── Build changelog entries ──────────────────────────────────────────
          CHANGELOG="# Changelog\n"

          PREV_TAG=""
          for TAG in $TAGS; do
            V="${TAG#v}"

            # Range: commits since previous tag (or all commits if first tag)
            if [ -z "$PREV_TAG" ]; then
              RANGE="$TAG"
            else
              RANGE="${TAG}..${PREV_TAG}"
            fi

            # Gather commits in this range, skip automated chore/bot commits
            COMMITS=$(git log "$RANGE" \
              --pretty=format:"%s" \
              --no-merges \
              | grep -v '\[skip ci\]' \
              | grep -v '^chore: bump addon version' \
              | grep -v '^Merge ' \
              || true)

            if [ -z "$COMMITS" ]; then
              COMMITS="- Internal improvements and dependency updates"
            else
              COMMITS=$(echo "$COMMITS" | sed 's/^/- /')
            fi

            CHANGELOG+="\n## ${V}\n${COMMITS}\n"
            PREV_TAG="$TAG"
          done

          printf "%b" "$CHANGELOG" > "$CHANGELOG_FILE"
          echo "Generated $CHANGELOG_FILE:"
          cat "$CHANGELOG_FILE"

      - name: Update config.yaml version
        run: |
          sed -i "s/^version: .*/version: \"${{ env.ADDON_VERSION }}\"/" ${{ env.ADDON_PATH }}/config.yaml

      - name: Commit CHANGELOG.md + config.yaml back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          # Re-apply version bump on the clean main checkout
          sed -i "s/^version: .*/version: \"${{ env.ADDON_VERSION }}\"/" ${{ env.ADDON_PATH }}/config.yaml
          # Re-generate changelog on the clean main checkout (same logic)
          VERSION="${{ env.ADDON_VERSION }}"
          CHANGELOG_FILE="${{ env.ADDON_PATH }}/CHANGELOG.md"
          TAGS=$(git tag --list 'v*' --sort=-version:refname)
          CHANGELOG="# Changelog\n"
          PREV_TAG=""
          for TAG in $TAGS; do
            V="${TAG#v}"
            if [ -z "$PREV_TAG" ]; then
              RANGE="$TAG"
            else
              RANGE="${TAG}..${PREV_TAG}"
            fi
            COMMITS=$(git log "$RANGE" \
              --pretty=format:"%s" \
              --no-merges \
              | grep -v '\[skip ci\]' \
              | grep -v '^chore: bump addon version' \
              | grep -v '^Merge ' \
              || true)
            if [ -z "$COMMITS" ]; then
              COMMITS="- Internal improvements and dependency updates"
            else
              COMMITS=$(echo "$COMMITS" | sed 's/^/- /')
            fi
            CHANGELOG+="\n## ${V}\n${COMMITS}\n"
            PREV_TAG="$TAG"
          done
          printf "%b" "$CHANGELOG" > "$CHANGELOG_FILE"
          git add ${{ env.ADDON_PATH }}/CHANGELOG.md ${{ env.ADDON_PATH }}/config.yaml
          git diff --staged --quiet || git commit -m "chore: bump addon to ${{ env.ADDON_VERSION }} + update CHANGELOG [skip ci]"
          git push origin main

  build:
    runs-on: ubuntu-latest
    needs: [changelog]
    # Run build whether changelog job ran or was skipped (manual dispatch)
    if: always()
    strategy:
      matrix:
        arch: [amd64, aarch64]
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Pull the latest main so we get the CHANGELOG commit if it just ran
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image repository name
        run: echo "REPOSITORY_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Resolve version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep '^version:' ${{ env.ADDON_PATH }}/config.yaml | sed 's/version: *"//' | sed 's/"//')
          fi
          echo "ADDON_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved version: $VERSION"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.ADDON_PATH }}/Dockerfile
          platforms: linux/${{ matrix.arch == 'armv7' && 'arm/v7' || matrix.arch }}
          push: true
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ env.ADDON_VERSION }}
          tags: |
            ghcr.io/${{ env.REPOSITORY_LC }}-addon-${{ matrix.arch }}:latest
            ghcr.io/${{ env.REPOSITORY_LC }}-addon-${{ matrix.arch }}:${{ github.sha }}
            ghcr.io/${{ env.REPOSITORY_LC }}-addon-${{ matrix.arch }}:${{ env.ADDON_VERSION }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && matrix.arch == 'amd64'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "HomeVault ${{ env.ADDON_VERSION }}"
          body_path: ${{ env.ADDON_PATH }}/CHANGELOG.md
          generate_release_notes: false
