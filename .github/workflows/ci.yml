name: CI

# Quality gate for feature work. Runs on every PR into `dev` (or `main`) and on
# pushes to those branches, so a feature is only mergeable once it type-checks,
# is formatted, passes tests, and builds.

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm check

      - name: Formatting (prettier)
        run: pnpm exec prettier --check .

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # Real-MySQL integration tests for the notification delivery paths.
  # Non-blocking for now (continue-on-error) while it stabilizes; the gated
  # tests self-skip when TEST_DATABASE_URL is unset.
  integration:
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: homevault_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s --health-timeout=5s --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Integration tests (real MySQL)
        env:
          TEST_DATABASE_URL: mysql://root:root@127.0.0.1:3306/homevault_test
        run: pnpm exec vitest run server/db/notifications.integration.test.ts
