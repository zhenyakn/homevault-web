name: CI

# Quality gate for feature work. Runs on every PR into `dev` (or `main`) and on
# pushes to those branches, so a feature is only mergeable once it type-checks,
# is formatted, passes tests, and builds.

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm check

      - name: Formatting (prettier)
        run: pnpm exec prettier --check .

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
