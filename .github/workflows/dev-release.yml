name: Dev Release

# Builds a testable, non-production release on every push to `dev`
# (i.e. every feature PR merged into the integration branch).
#
#   * Publishes multi-arch Docker images to ghcr.io under a separate
#     `-addon-dev-<arch>` image, tagged `:dev`, `:dev-<sha>` and the
#     resolved dev version.
#   * Bumps the "HomeVault (Dev)" Home Assistant add-on version so the
#     supervisor offers the new build as an update.
#
# Test the result, then promote by opening a `dev` -> `main` pull request.

on:
  push:
    branches: [dev]
  workflow_dispatch:

# Serialize runs so the version bump committed back to `dev` never races.
concurrency:
  group: dev-release
  cancel-in-progress: false

env:
  DOCKERFILE: homevault-addon/Dockerfile
  ADDON_DEV_PATH: homevault-addon-dev
  IMAGE_BASE: ghcr.io/zhenyakn/homevault-web-addon-dev

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve dev version
        run: |
          echo "DEV_VERSION=0.0.0-dev.${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: linux/${{ matrix.arch }}
          push: true
          provenance: false
          sbom: false
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ env.DEV_VERSION }}
          tags: |
            ${{ env.IMAGE_BASE }}-${{ matrix.arch }}:dev
            ${{ env.IMAGE_BASE }}-${{ matrix.arch }}:dev-${{ env.SHORT_SHA }}
            ${{ env.IMAGE_BASE }}-${{ matrix.arch }}:${{ env.DEV_VERSION }}

      - name: Verify image was pushed
        run: docker buildx imagetools inspect "${{ env.IMAGE_BASE }}-${{ matrix.arch }}:${{ env.DEV_VERSION }}"

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v7
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump dev add-on version
        run: |
          VERSION="0.0.0-dev.${{ github.run_number }}"
          sed -i "s/^version: .*/version: \"${VERSION}\"/" "${ADDON_DEV_PATH}/config.yaml"
          echo "DEV_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Commit version bump back to dev
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${ADDON_DEV_PATH}/config.yaml"
          if git diff --staged --quiet; then
            echo "No version change to commit."
            exit 0
          fi
          git commit -m "chore(dev): release ${DEV_VERSION} [skip ci]"
          git push origin HEAD:dev \
            || (git fetch origin dev && git rebase origin/dev && git push origin HEAD:dev)

      - name: Job summary
        run: |
          {
            echo "## Dev release \`${DEV_VERSION}\` published"
            echo ""
            echo "Built from \`${GITHUB_SHA}\`."
            echo ""
            echo "### Test via Docker"
            echo '```'
            echo "docker pull ${IMAGE_BASE}-amd64:dev"
            echo '```'
            echo ""
            echo "### Test via Home Assistant"
            echo "Open the **HomeVault (Dev)** add-on, refresh the store, and update to \`${DEV_VERSION}\`."
            echo ""
            echo "Happy with it? Open a \`dev\` -> \`main\` pull request to promote."
          } >> "$GITHUB_STEP_SUMMARY"
