name: HomeVault
version: "0.5.11"
slug: homevault
description: A property management solution for homeowners and small investors.
url: https://github.com/zhenyakn/homevault-web

arch:
  - aarch64
  - amd64

init: false
ingress: true
ingress_port: 3005
panel_icon: mdi:home-account
panel_title: HomeVault

startup: services
boot: auto
host_network: false
full_access: false
homeassistant: "2023.1.0"

hassio_api: true
hassio_role: default

map:
  - ssl:rw
  - share:rw

options:
  DATABASE_URL: "mysql://homeassistant:homeassistant@core-mariadb/homeassistant?charset=utf8mb4"
  JWT_SECRET: ""
  OWNER_OPEN_ID: "owner"
  VITE_APP_ID: "homevault"
  OAUTH_SERVER_URL: ""
  NO_AUTH: true
  SEED_MOCK_DATA: false
  PORT: 3005
  LOG_LEVEL: "info"
  STORAGE_ENDPOINT: ""
  STORAGE_BUCKET: ""
  STORAGE_REGION: "auto"
  STORAGE_ACCESS_KEY_ID: ""
  STORAGE_SECRET_ACCESS_KEY: ""
  STORAGE_PUBLIC_URL: ""

schema:
  DATABASE_URL: "str?"
  JWT_SECRET: "str?"
  OWNER_OPEN_ID: "str?"
  VITE_APP_ID: "str?"
  OAUTH_SERVER_URL: "str?"
  NO_AUTH: "bool?"
  SEED_MOCK_DATA: "bool?"
  PORT: "int"
  LOG_LEVEL: "str?"
  STORAGE_ENDPOINT: "str?"
  STORAGE_BUCKET: "str?"
  STORAGE_REGION: "str?"
  STORAGE_ACCESS_KEY_ID: "str?"
  STORAGE_SECRET_ACCESS_KEY: "str?"
  STORAGE_PUBLIC_URL: "str?"

services:
  - mysql:want

environment:
  DATABASE_URL: "{{DATABASE_URL}}"
  JWT_SECRET: "{{JWT_SECRET}}"
  OWNER_OPEN_ID: "{{OWNER_OPEN_ID}}"
  VITE_APP_ID: "{{VITE_APP_ID}}"
  OAUTH_SERVER_URL: "{{OAUTH_SERVER_URL}}"
  NO_AUTH: "{{NO_AUTH}}"
  SEED_MOCK_DATA: "{{SEED_MOCK_DATA}}"
  PORT: "{{PORT}}"
  LOG_LEVEL: "{{LOG_LEVEL}}"
  STORAGE_ENDPOINT: "{{STORAGE_ENDPOINT}}"
  STORAGE_BUCKET: "{{STORAGE_BUCKET}}"
  STORAGE_REGION: "{{STORAGE_REGION}}"
  STORAGE_ACCESS_KEY_ID: "{{STORAGE_ACCESS_KEY_ID}}"
  STORAGE_SECRET_ACCESS_KEY: "{{STORAGE_SECRET_ACCESS_KEY}}"
  STORAGE_PUBLIC_URL: "{{STORAGE_PUBLIC_URL}}"

image: "ghcr.io/zhenyakn/homevault-web-addon-{arch}"
